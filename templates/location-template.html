<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{TITLE}}</title>

    <meta name="description" content="{{DESCRIPTION}}" />

    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://sniffy.in/dog-grooming-in-pune/{{SLUG}}" />

    <meta name="geo.region" content="IN-MH" />
    <meta name="geo.placename" content="{{LOCALITY}}, Pune" />
    <meta name="geo.position" content="{{LAT}};{{LNG}}" />
    <meta name="ICBM" content="{{LAT}}, {{LNG}}" />

    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96"/>
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-title" content="Sniffy" />
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{OG_TITLE}}" />
    <meta property="og:description" content="{{OG_DESCRIPTION}}" />
    <meta property="og:url" content="https://sniffy.in/dog-grooming-in-pune/{{SLUG}}" />
    <meta property="og:image" content="https://sniffy.in/sniffy-logo.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{TWITTER_TITLE}}" />
    <meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}" />

    <!-- Local Business Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "PetGrooming",
        "@id": "https://sniffy.in/dog-grooming-in-pune/{{SLUG}}#petgrooming",
        "name": "Sniffy Dog Grooming — {{LOCALITY}}",
        "url": "https://sniffy.in/dog-grooming-in-pune/{{SLUG}}",
        "image": "https://sniffy.in/sniffy-logo.png",
        "telephone": "+918971313003",
        "email": "care@sniffy.in",

        "address": {
          "@type": "PostalAddress",
          "addressLocality": "{{LOCALITY}}",
          "addressRegion": "MH",
          "postalCode": "{{POSTAL}}",
          "addressCountry": "IN"
        },

        "geo": {
          "@type": "GeoCoordinates",
          "latitude": {{LAT}},
          "longitude": {{LNG}}
        },

        "areaServed": {{AREA_SERVED}},

        "serviceType": "Dog Grooming at Home",

        "priceRange": "₹799 - ₹1299",

        "paymentAccepted": "Cash, UPI",
        "currenciesAccepted": "INR",

        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"
          ],
          "opens": "09:00",
          "closes": "21:00"
        },

        "sameAs": [
          "https://www.instagram.com/sniffy.in"
        ]
      }
    </script>

    <!-- Breadcrumb Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [

          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://sniffy.in"
          },

          {
            "@type": "ListItem",
            "position": 2,
            "name": "Dog Grooming in Pune",
            "item": "https://sniffy.in/dog-grooming-in-pune"
          },

          {
            "@type": "ListItem",
            "position": 3,
            "name": "Dog Grooming in {{LOCALITY}}",
            "item": "https://sniffy.in/dog-grooming-in-pune/{{SLUG}}"
          }

        ]
      }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/entries/{{SLUG}}.tsx"></script>
  </body>
</html>
